apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-app
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: argocd-app
  template:
    metadata:
      labels:
        app: argocd-app
    spec:
      containers:
        - name: argocd-app
          image: joyboy123/argocd:ea6c49f8039efc72c9c9fd81eae90a66bbe6f0f1
          ports:
            - containerPort: 3000