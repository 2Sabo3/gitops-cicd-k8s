apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-app
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: argocd-app
  template:
    metadata:
      labels:
        app: argocd-app
    spec:
      containers:
        - name: argocd-app
          image: joyboy123/argocd:ca877164916e7e69c9e09a0b815bfe9a340d625e
          ports:
            - containerPort: 3000