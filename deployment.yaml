apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: argocd-app
  template:
    metadata:
      labels:
        app: argocd-app
    spec:
      containers:
        - name: argocd-app
          image: joyboy123/argocd:67d33447658cfb4687d7cf96f07af5f518108cf8
          ports:
            - containerPort: 3000