apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-app
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: argocd-app
  template:
    metadata:
      labels:
        app: argocd-app
    spec:
      containers:
        - name: argocd-app
          image: joyboy123/argocd:c38ad36a04af42bace452c6479ab9b2aab5f4305
          ports:
            - containerPort: 3000