apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: argocd-app
  template:
    metadata:
      labels:
        app: argocd-app
    spec:
      containers:
        - name: argocd-app
          image: joyboy123/argocd:latest   # 👈 THIS gets updated by CI
          ports:
            - containerPort: 3000